<template>
    <lightning-card title="Signature Configuration" icon-name="utility:signpost">
        <div class="config-shell">
            <div class="config-hero">
                <div>
                    <div class="eyebrow">Signing Workflow</div>
                    <div class="hero-title">{workflowSummary}</div>
                </div>
                <div class="signer-count">
                    <span>Signers</span>
                    <strong>{signerCount}</strong>
                </div>
            </div>

            <div class="settings-grid">
                <lightning-combobox label="Provider" value={provider} options={providerOptions} onchange={handleProviderChange}></lightning-combobox>
                <lightning-combobox label="Order" value={signingOrder} options={orderOptions} onchange={handleOrderChange}></lightning-combobox>
                <lightning-input type="number" label="Expiry Days" value={expiryDays} min="1" max="365" onchange={handleExpiryChange}></lightning-input>
            </div>

            <template if:true={errorMessage}>
                <div class="error-message" role="alert">{errorMessage}</div>
            </template>

            <div class="signer-list">
                <template for:each={signers} for:item="signer" for:index="index">
                    <div key={signer.key} class="signer-row">
                        <div class="signer-badge">{signer.signingOrder}</div>
                        <lightning-input label="Name" value={signer.signerName} data-index={index} data-field="signerName" onchange={handleSignerChange}></lightning-input>
                        <lightning-input type="email" label="Email" value={signer.signerEmail} data-index={index} data-field="signerEmail" onchange={handleSignerChange}></lightning-input>
                        <lightning-combobox label="Role" value={signer.signerRole} options={roleOptions} data-index={index} data-field="signerRole" onchange={handleSignerChange}></lightning-combobox>
                        <lightning-input type="number" label="Step" value={signer.signingOrder} min="1" data-index={index} data-field="signingOrder" onchange={handleSignerChange}></lightning-input>
                        <lightning-button-icon icon-name="utility:delete" variant="border-filled" alternative-text="Remove" title="Remove" data-index={index} onclick={removeSigner}></lightning-button-icon>
                    </div>
                </template>
            </div>

            <div class="actions">
                <lightning-button icon-name="utility:add" label="Add Signer" onclick={addSigner}></lightning-button>
                <lightning-button variant="brand" label="Create Workflow" onclick={handleCreateWorkflow} disabled={isCreateDisabled}></lightning-button>
            </div>
        </div>
    </lightning-card>
</template>

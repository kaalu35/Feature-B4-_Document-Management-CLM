<template>
    <lightning-card title="Document Preview" icon-name="doctype:pdf">
        <div class="preview-shell">
            <div class="preview-hero">
                <div>
                    <div class="eyebrow">Merge Readiness</div>
                    <div class="hero-title">{completionPercent}% resolved</div>
                </div>
                <div class="hero-stats">
                    <span>{resolvedCount} ready</span>
                    <span>{unresolvedCount} unresolved</span>
                </div>
            </div>

            <div class="toolbar">
                <lightning-input
                    class="template-input"
                    type="text"
                    label="Template Id"
                    value={draftTemplateId}
                    onchange={handleTemplateChange}
                    disabled={hasTemplateApiValue}>
                </lightning-input>
                <lightning-button
                    variant="brand"
                    label="Generate"
                    onclick={handleGenerate}
                    disabled={isGenerateDisabled}>
                </lightning-button>
            </div>

            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading preview" size="small"></lightning-spinner>
            </template>

            <template if:true={errorMessage}>
                <div class="error-message" role="alert">{errorMessage}</div>
            </template>

            <template if:true={hasRows}>
                <div class="completion-bar" aria-label="Merge field completion">
                    <div class="completion-bar__fill" style={completionStyle}></div>
                </div>

                <div class="preview-grid">
                    <template for:each={rows} for:item="row">
                        <div key={row.token} class={row.rowClass}>
                            <div class="token">{row.token}</div>
                            <div class="value">{row.value}</div>
                        </div>
                    </template>
                </div>
            </template>

            <template if:false={hasRows}>
                <template if:false={isLoading}>
                    <div class="empty-state">
                        <lightning-icon icon-name="utility:preview" size="small"></lightning-icon>
                        <span>No merge fields found.</span>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>

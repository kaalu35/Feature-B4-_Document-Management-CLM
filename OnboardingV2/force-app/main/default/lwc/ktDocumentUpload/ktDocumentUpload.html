<template>
    <lightning-card title="Document Upload" icon-name="utility:upload">
        <div class="upload-shell">
            <div class="upload-header">
                <div>
                    <div class="eyebrow">Secure Intake</div>
                    <div class="upload-title">Upload onboarding evidence</div>
                </div>
                <span class="limit-pill">25 MB max</span>
            </div>

            <div
                class={dropZoneClass}
                ondragover={handleDragOver}
                ondragleave={handleDragLeave}
                ondrop={handleDrop}>
                <div class="drop-icon">
                    <lightning-icon icon-name="utility:upload" size="small"></lightning-icon>
                </div>
                <div class="drop-title">{selectedFileName}</div>
                <div class="drop-subtitle">PDF, DOCX, JPG, JPEG, or PNG</div>
                <lightning-input
                    class="file-input"
                    type="file"
                    label="File"
                    accept={acceptedTypes}
                    onchange={handleFileChange}>
                </lightning-input>
            </div>

            <template if:true={isUploading}>
                <div class="progress-card">
                    <div class="progress-label">Uploading and preparing vault record</div>
                    <lightning-progress-bar value={progressValue} size="medium"></lightning-progress-bar>
                </div>
            </template>

            <template if:true={errorMessage}>
                <div class="error-message" role="alert">{errorMessage}</div>
            </template>

            <template if:true={successMessage}>
                <div class="success-message" role="status">{successMessage}</div>
            </template>

            <div class="actions">
                <lightning-button
                    variant="brand"
                    label="Upload"
                    onclick={handleUpload}
                    disabled={isUploadDisabled}>
                </lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
